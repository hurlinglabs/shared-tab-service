name: Publish shared-tab-service

on:
  push:
    tags:
      - "@hurling/shared-tab-service@*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.0)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get version from tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            TAG=${GITHUB_REF#refs/tags/}
            VERSION=${TAG#*@}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install npm v11
        run: npm install -g npm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Isolate package
        working-directory: packages/shared-tab-service
        run: pnpm exec isolate

      - name: Publish @hurling/shared-tab-service
        working-directory: packages/shared-tab-service/isolate
        run: npm publish --access public

      - name: Prepare alias package
        working-directory: packages/shared-tab-service/isolate
        run: npm pkg set name="shared-tab-service"

      - name: Publish shared-tab-service (alias)
        working-directory: packages/shared-tab-service/isolate
        run: npm publish --access public --force
